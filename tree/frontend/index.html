<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>宝宝溯源果园 - 安心果泥 从树到口</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- 顶部导航 -->
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-seedling"></i> 宝宝溯源果园
            </div>
            <div class="user-info" id="userInfo">
                <span id="usernameDisplay"></span>
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <!-- 主内容区：动态组件 -->
        <main id="mainContent">
            <!-- 登录/注册界面初始显示 -->
            <div id="authContainer"></div>
            <!-- 主界面（登录后显示） -->
            <div id="dashboard" style="display: none;">
                <!-- 资源栏 -->
                <div class="resource-bar">
                    <div class="resource-item"><i class="fas fa-tint"></i> 水滴: <span id="waterCount">0</span></div>
                    <div class="resource-item"><i class="fas fa-leaf"></i> 肥料: <span id="fertilizerCount">0</span></div>
                    <div class="resource-item"><i class="fas fa-puzzle-piece"></i> 溯源碎片: <span id="shardsCount">0</span></div>
                </div>
                <!-- 选项卡导航 -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="garden"><i class="fas fa-tree"></i> 我的果园</button>
                    <button class="tab-btn" data-tab="tasks"><i class="fas fa-tasks"></i> 任务</button>
                    <button class="tab-btn" data-tab="nutrition"><i class="fas fa-brain"></i> 营养攻略</button>
                    <button class="tab-btn" data-tab="shop"><i class="fas fa-gift"></i> 兑换商城</button>
                </div>
                <!-- 各面板内容 -->
                <div id="gardenPanel" class="tab-panel active"></div>
                <div id="tasksPanel" class="tab-panel"></div>
                <div id="nutritionPanel" class="tab-panel"></div>
                <div id="shopPanel" class="tab-panel"></div>
            </div>
        </main>

        <!-- 弹窗通用遮罩 -->
        <div id="modal" class="modal" style="display:none">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components/auth.js"></script>
    <script src="js/components/babyProfile.js"></script>
    <script src="js/components/treeGarden.js"></script>
    <script src="js/components/taskPanel.js"></script>
    <script src="js/components/nutritionAgent.js"></script>
    <script src="js/components/redeemShop.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
